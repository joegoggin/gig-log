<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script>
            (() => {
                const root = document.documentElement;
                const media = window.matchMedia("(prefers-color-scheme: dark)");
                const applyTheme = (isDark) => {
                    root.setAttribute("data-theme", isDark ? "dark" : "light");
                };

                applyTheme(media.matches);

                if (media.addEventListener) {
                    media.addEventListener("change", (event) =>
                        applyTheme(event.matches),
                    );
                } else {
                    media.addListener((event) => applyTheme(event.matches));
                }
            })();
        </script>
        <title>GigLog</title>
        <link data-trunk rel="rust" data-wasm-opt="z" />
        <link data-trunk rel="sass" href="styles/main.scss" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body></body>
</html>
