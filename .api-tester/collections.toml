[[groups]]
name = "Auth"

[[groups.routes]]
scope_id = "route_auth_signup_1"
name = "Sign Up"
method = "POST"
url = "http://localhost:8000/auth/sign-up"
headers = ["Content-Type: application/json"]
body = """
{
    "first_name": "{{SIGN_UP_FIRST_NAME}}",
    "last_name": "{{SIGN_UP_LAST_NAME}}",
    "email": "{{EMAIL}}",
    "password": "{{SIGN_UP_PASSWORD}}",
    "confirm_password": "{{SIGN_UP_CONFIRM_PASSWORD}}"
}"""

[[groups.routes]]
scope_id = "route_auth_confirm_email_1"
name = "Confirm Email"
method = "POST"
url = "http://localhost:8000/auth/confirm-email"
headers = ["Content-Type: application/json"]
body = """
{
    "code": "{{EMAIL_CONFIRMATION_CODE}}"
}"""

[[groups.routes]]
scope_id = "route_auth_login_1"
name = "Log In"
method = "POST"
url = "http://localhost:8000/auth/log-in"
headers = ["Content-Type: application/json"]
body = """
{
    "email": "{{EMAIL}}",
    "password": "{{LOGIN_PASSWORD}}"
}"""

[[groups.routes]]
scope_id = "route_auth_logout_1"
name = "Log Out"
method = "POST"
url = "http://localhost:8000/auth/log-out"
headers = []

[[groups.routes]]
